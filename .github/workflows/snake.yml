name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
          
      - name: generate-snake
        uses: Platane/snk@v3
        with:
          github_user_name: minlonghuo-lab
          svg_path: output/snake.svg
          github_token: ${{ secrets.GITHUB_TOKEN }}
